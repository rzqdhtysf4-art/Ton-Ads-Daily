<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ton Ads Daily</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; padding:40px; }
    h1 { color:#00ff9d; margin-bottom:20px; }
    button { background:#00ff9d; color:black; padding:18px 40px; font-size:22px; border:none; border-radius:12px; cursor:pointer; margin:20px 0; }
    #status { font-size:18px; margin-top:30px; }
  </style>
</head>
<body>
  <h1>Ton Ads Daily</h1>
  <p>Watch ads → Earn real TON daily (30% fair share)</p>
  <button id="watchAd">Watch Ad & Earn TON</button>
  <p id="status">Status: Ready – Click to start</p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    document.getElementById('watchAd').onclick = () => {
      document.getElementById('status').innerText = 'Loading ad... (AdsGram coming soon)';
      setTimeout(() => {
        alert('Ad completed! +0.01 TON earned (test mode)');
        document.getElementById('status').innerText = 'Earned! Watch another?';
      }, 2000);
    };
  </script>
</body>
</html>
